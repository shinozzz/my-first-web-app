<header class="header">
	<img src="https://cdn.pixabay.com/photo/2023/07/28/10/01/space-8154934_1280.png" alt="">

	<div class="sitename">
		<h1 class="h1">お問い合わせ</h1>
	</div>
</header>

<nav class="nav">
	<a href="profile.html">自己紹介</a>
    <a href="work.html">作品</a><a href="##"></a>

<main class="wrap">
	<div class="section">
		お気軽にお問い合わせください。
	</div>

	<div class="section">
		<form action="" method="">
			<div class="form-block">
				<label>
					<b>タイトル</b>(任意)
					<div>
						<input class="form-full-width-formitem" type="text">
					</div>
				</label>
			</div>

			<div class="form-block">
				<label>
					<b>お名前</b>(任意)
					<div>
						<input class="form-full-width-formitem" type="text">
					</div>
				</label>
			</div>

			<div class="form-block">
				<label>
					<b>メールアドレス</b>(任意)
					<div>
						<input class="form-full-width-formitem" type="email">
					</div>
				</label>
			</div>

			<div class="form-block">
				<label>
					<b>メッセージ</b><span class="hissu"> * 必須</span>
					<div>
						<textarea class="form-full-width-formitem" rows="9" cols=""></textarea>
					</div>
				</label>
			</div>

			<div class="form-block">
				<fieldset>
					<legend>
						<b>返信方法</b><span class="hissu"> * 必須</span>
					</legend>
					<label><input type="radio" name="testname" value="メールアドレスへ">メールアドレスへ</label>
					<label><input type="radio" name="testname" value="サイト内の返信用ページへ">サイト内の返信用ページへ</label>
					<label><input type="radio" name="testname" value="返信不要">返信不要</label>
				</fieldset>
			</div>

			<div class="form-block">
				<input class="form-big-button" type="submit" value="送信する">
			</div>
		</form>
	</div>
</main>
